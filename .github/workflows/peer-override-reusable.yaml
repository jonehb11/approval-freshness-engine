name: Approval Freshness Peer Override
on:
  workflow_call:
    inputs:
      trigger_comment:
        required: false
        type: string
        default: '/override-freshness'
      allowed_team:
        required: false
        type: string
        default: 'engineering'

jobs:
  override:
    name: Process Peer Override
    # Only run on issue_comment, when it's a new comment, and matches our trigger phrase
    if: ${{ github.event_name == 'issue_comment' && github.event.action == 'created' && startsWith(github.event.comment.body, inputs.trigger_comment) && github.event.issue.pull_request }}
    runs-on: ubuntu-latest
    steps:
      - name: Validate Peer and Unblock
        uses: actions/github-script@v7
        with:
          script: |
            const pr = await github.rest.pulls.get({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: context.issue.number
            });
            
            // 1. Prevent Self-Approval
            if (context.actor === pr.data.user.login) {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body: `❌ **Override Rejected:** You cannot use \`${context.payload.comment.body}\` on your own pull request. A peer must review and override.`
              });
              core.setFailed("Self-override attempted");
              return;
            }
            
            // 2. (Optional) Check team membership here using github.rest.teams.getMembershipForUserInOrg
            // For now, we assume any authenticated collaborator who isn't the author can override.

            // 3. Force the status check to success
            await github.rest.checks.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              head_sha: pr.data.head.sha,
              name: 'approval-freshness/evaluated',
              status: 'completed',
              conclusion: 'success',
              output: {
                title: 'Manually Overridden by Peer',
                summary: `This check was manually bypassed by @${context.actor} via comment override.`
              }
            });
            
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: `✅ **Override Accepted:** @${context.actor} has manually verified this PR. The \`approval-freshness/evaluated\` check has been forced to success.`
            });
